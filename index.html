<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, user-scalable=1"
    />
    <title>Tess</title>
    <link rel="stylesheet" href="index.css" />
    <link rel="stylesheet" href="themes.css" />
    <link rel="stylesheet" href="buttons.css" />
    <link rel="icon" type="image/svg" href="assets/logo.svg" />
  </head>
  <body>
    <div id="app"></div>
    <script src="elm.js"></script>
    <script>
      // Button animation
      document.addEventListener("click", (e) => {
        const btn = e.target.closest(".action-btn");
        if (!btn) return;
        btn.classList.remove("drawing");
        void btn.offsetWidth;
        btn.classList.add("drawing");
        btn.style.setProperty("--angle", "0");
        btn.addEventListener(
          "animationend",
          () => btn.classList.remove("drawing"),
          { once: true },
        );
      });
      // Get local values
      let tessellation =
        localStorage.getItem("tess-tessellation") ?? "Hexagonal";
      let theme = localStorage.getItem("tess-theme") ?? "Forest";
      let primary = "#FFFFFF";
      let secondary = "#CCCCCC";
      let ternary = "#999999";
      let quart = "#555555";
      let strokeCol = "#000000";
      let stroke = (localStorage.getItem("tess-stroke") ?? "true") === "true";
      let categories = JSON.parse(localStorage.getItem("tess-categories")) ?? [
        "Regular",
      ];
      // Custom theme style
      const styleCustomTheme = document.createElement("style");
      document.head.appendChild(styleCustomTheme);
      const setCustomStyle = () => {
        primary = localStorage.getItem("tess-primary") ?? primary;
        secondary = localStorage.getItem("tess-secondary") ?? secondary;
        ternary = localStorage.getItem("tess-ternary") ?? ternary;
        quart = localStorage.getItem("tess-quart") ?? quart;
        strokeCol = localStorage.getItem("tess-stroke-col") ?? strokeCol;
        styleCustomTheme.textContent = `.themeCustom {
          --primary-color: ${primary};
          --secondary-color: ${secondary};
          --ternary-color: ${ternary};
          --quart-color: ${quart};
          --stroke-color: ${strokeCol};
        }`;
      };
      // Initiate app
      setCustomStyle();
      var app = Elm.Main.init({
        node: document.getElementById("app"),
        flags: {
          tessellation,
          categories,
          theme,
          strokeCol,
          primary,
          secondary,
          ternary,
          quart,
          stroke,
        },
      });
      // Save local values
      app.ports.setLocal.subscribe(function (pair) {
        localStorage.setItem(pair[0], pair[1]);
        setCustomStyle();
      });
      app.ports.setCategories.subscribe(function (cats) {
        localStorage.setItem("tess-categories", JSON.stringify(cats));
        setCustomStyle();
      });
      // Port for svg download
      app.ports.downloadSvg.subscribe(function (imageName) {
        const containerId = "tilingDownload";
        const svgElement = document
          .getElementById(containerId)
          .querySelector("svg");
        // Resolve CSS colors, clone so DOM is not mutated
        const clone = svgElement.cloneNode(true);
        clone.querySelectorAll("*").forEach((el, i) => {
          const live = svgElement.querySelectorAll("*")[i];
          const computed = getComputedStyle(live);
          const fill = computed.fill;
          if (fill) el.setAttribute("fill", fill);
          const stroke = computed.stroke;
          if (stroke) el.setAttribute("stroke", stroke);
        });
        // Download
        const svgString = new XMLSerializer().serializeToString(clone);
        const blob = new Blob([svgString], { type: "image/svg+xml" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = imageName;
        setTimeout(() => {
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
          URL.revokeObjectURL(url);
        }, 2000);
      });
    </script>
  </body>
</html>
